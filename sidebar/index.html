<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPlus Organizer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="branding">
        <div class="logo"><span>C+</span></div>
        <div class="title-area">
          <h1>ClassPlus Organizer</h1>
          <p id="capture-status">Browse a course to start</p>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-view="all"><span class="icon">📚</span> All</button>
        <button class="tab" data-view="bookmarks"><span class="icon">⭐</span> Starred</button>
        <button class="tab" data-view="folders"><span class="icon">📁</span> Folders</button>
        <button class="tab" data-view="dashboard"><span class="icon">📊</span> Stats</button>
      </nav>
    </header>

    <div class="controls-area" id="controls-area">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search lectures, teachers, topics...">
        <div class="search-actions">
          <span id="search-count"></span>
          <button id="clear-search" class="hidden">✕</button>
        </div>
      </div>
      
      <div class="filter-panel">
        <div class="filter-header">
          <button id="toggle-filters" class="toggle-btn">
            <span class="icon">🔽</span> Filters <span id="filter-dot" class="dot hidden"></span>
          </button>
          <select id="sort-select" class="sort-select">
            <option value="newest">🕐 Newest First</option>
            <option value="oldest">📅 Oldest First</option>
            <option value="duration_high">⏱️ Longest</option>
            <option value="duration_low">⚡ Shortest</option>
            <option value="alphabetical">🔤 A → Z</option>
          </select>
        </div>
        
        <div id="filter-body" class="filter-body hidden glass">
          <div class="filter-group">
            <label>Teacher</label>
            <select id="teacher-filter">
              <option value="">All Teachers</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label>Status</label>
            <div class="chips" id="status-chips">
              <button class="chip active" data-status="all">📋 All</button>
              <button class="chip" data-status="not_started">⬜ Not Started</button>
              <button class="chip" data-status="watching">🔄 Watching</button>
              <button class="chip" data-status="completed">✅ Completed</button>
              <button class="chip" data-status="revise_later">📌 Revise</button>
            </div>
          </div>
          
          <button id="clear-filters" class="clear-btn hidden">✕ Clear all filters</button>
        </div>
      </div>
    </div>

    <div id="continue-watching" class="continue-watching hidden">
      <h3><span>🕐</span> Continue Watching</h3>
      <div class="cw-carousel" id="cw-carousel"></div>
    </div>

    <div class="main-content" id="main-content">
      <div id="lecture-list" class="lecture-list"></div>
      
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon" id="empty-icon">📖</div>
        <h3 id="empty-title">No lectures captured yet</h3>
        <p id="empty-desc">Browse your ClassPlus course and lectures will appear here.</p>
      </div>
    </div>

    <div class="quick-nav" id="quick-nav">
      <span class="label">Jump:</span>
      <button class="jump-btn" data-target="0">First</button>
      <button class="jump-btn" data-target="49">#50</button>
      <button class="jump-btn" data-target="99">#100</button>
      <button class="jump-btn" data-target="last">Latest</button>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="dashboard-view hidden">
      <div class="glass p-4 text-center">
        <h3>Progress Overview</h3>
        <div class="donut-chart">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="42" class="donut-bg" />
            <circle cx="50" cy="50" r="42" class="donut-fill" id="donut-fill" stroke-dasharray="264" stroke-dashoffset="264" />
          </svg>
          <div class="donut-text">
            <span id="progress-pct">0%</span>
            <small>Complete</small>
          </div>
        </div>
        <p id="progress-text" class="mt-2 text-xs">0 of 0 lectures completed</p>
      </div>

      <div class="stats-grid mt-2">
        <div class="stat-card" data-filter="all">
          <div class="stat-header"><span>📚</span> Total</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card" data-filter="completed">
          <div class="stat-header"><span>✅</span> Done</div>
          <div class="stat-value text-success" id="stat-completed">0</div>
        </div>
        <div class="stat-card" data-filter="not_started">
          <div class="stat-header"><span>⏳</span> Pending</div>
          <div class="stat-value" id="stat-pending">0</div>
        </div>
        <div class="stat-card" data-filter="bookmarks">
          <div class="stat-header"><span>⭐</span> Starred</div>
          <div class="stat-value text-warning" id="stat-starred">0</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Context Menus and Modals -->
  <div id="overlay" class="overlay hidden"></div>
  
  <div id="context-menu" class="context-menu hidden glass shadow">
    <button id="menu-tag">🏷️ Manage Tags</button>
    <button id="menu-folder">📁 Add to Folder</button>
    <button id="menu-status">📊 Set Status</button>
  </div>

</body>
</html>
